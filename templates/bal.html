<!DOCTYPE html>
<html lang="en">
    <head>
        <title> Get Balance - Budget App </title>
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    </head>
    <body>
        <div class="centered-box">
            <h1>Balance :</h1>
            {% for cat in categories %}
                <h2>{{cat.name}} : {{cat.get_balance()}}</h2>
            {% endfor %}
        </div>
    </body>
</html>
